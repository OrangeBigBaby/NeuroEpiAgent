  question: Is self-reported stroke history in US adults associated with metabolic
    syndrome components, pooling NHANES 2011-2018?
  rationale: NHANES captures both stroke self-report (MCQ160F) and metabolic syndrome
    components (lipids, glucose, waist circumference) across cycles G-J, making this
    association feasible for cross-sectional analysis.
  steps:
  - description: Merge NHANES cycles G-J and apply adult inclusion criteria
    outputs: []
    step: '1'
  - description: Define metabolic syndrome components from lab variables
    outputs: []
    step: '2'
  - description: Apply survey design weights for cross-sectional analysis
    outputs: []
    step: '3'
  title: Stroke and metabolic syndrome, NHANES 2011-2018
  uses_fasting_subsample: false

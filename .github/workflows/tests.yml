name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev extras only — NO data downloads)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # Use `python -m pytest` so the interpreter owning the installed
        # `neurosurg-epi-agent` + pytest is the one that runs. `-ra` summarizes
        # everything except passed tests; full output is retained on failure.
        # `|| dump-traceback` runs on failure so the traceback reaches the
        # public Actions log (the raw job log is otherwise auth-gated).
        run: |
          set +e
          python -m pytest -ra --tb=long --showlocals
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "==== pytest FAILED with exit code $rc ===="
            echo "Re-running with -v to expose test names:"
            python -m pytest -ra --tb=long --showlocals -v 2>&1 | tail -200
            echo "==== end failure dump ===="
          fi
          exit $rc

  secret-scan:
    name: secret scan on tracked tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: scan tracked files for secrets / absolute paths
        # The scanner is a standalone, unit-tested module
        # (scripts/scan_tracked_secrets.py + tests/test_secret_scan.py). It
        # detects credential assignments and well-known token shapes, plus the
        # local workspace path markers, while allowing exact policy-doc paths
        # via a precise allowlist. It does NOT match bare keyword mentions, so
        # it cannot self-trigger on its own rules.
        run: python scripts/scan_tracked_secrets.py --root .

  size-check:
    name: tracked files <= 50 MB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: ensure no tracked file exceeds 50 MB
        run: |
          BIG=$(git ls-files | xargs -I {} sh -c 'wc -c "{}" 2>/dev/null' | awk '$1 > 52428800 { print $2 }')
          if [ -n "$BIG" ]; then
            echo "ERROR: files > 50 MB tracked:"
            echo "$BIG"
            exit 1
          fi
          echo "size check: clean"

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev extras only — NO data downloads)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  secret-scan:
    name: secret scan on tracked tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: scan for accidental secrets / absolute paths
        run: |
          # Allowlisted files where these strings appear as policy text.
          ALLOWLIST='(docs/DATA_GOVERNANCE.md|docs/DATA_PROVENANCE.md|docs/REPOSITORY_RELEASE_CHECKLIST.md)'
          # Search tracked tree only — never the working copy.
          HITS=$(git ls-files | grep -vE "$ALLOWLIST" | \
                 xargs grep -lE '(api_key|apikey|password|Bearer)[^A-Za-z]|E:\\Nhance|C:\\Users' 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: forbidden tokens / absolute paths found in tracked tree:"
            echo "$HITS"
            exit 1
          fi
          echo "secret scan: clean"

  size-check:
    name: tracked files <= 50 MB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ensure no tracked file exceeds 50 MB
        run: |
          BIG=$(git ls-files | xargs -I {} sh -c 'wc -c "{}" 2>/dev/null' | awk '$1 > 52428800 { print $2 }')
          if [ -n "$BIG" ]; then
            echo "ERROR: files > 50 MB tracked:"
            echo "$BIG"
            exit 1
          fi
          echo "size check: clean"
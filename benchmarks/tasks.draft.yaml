  - id: tumor_brain_metastasis
    domain: tumor
    question: >
      Frequency of brain metastases from primary lung cancer in NHANES cancer history.
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES has no cancer history or metastasis data. No tumor registry linkage.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: tumor_global_burden_cns
    domain: tumor
    question: >
      Global brain/CNS cancer disability-adjusted life-years by region and year.
    expected_database: GBD
    expected_feasible: false
    rationale: >
      GBD adapter is planned but not active in MVP. This should route to GBD
      but be marked infeasible.
    domain_specific_notes: "GBD adapter not implemented"
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  # --------------------------------------------------------------------------- #
  # SUBARACHNOID HEMORRHAGE (3 tasks)
  # --------------------------------------------------------------------------- #

  - id: sah_smoking_risk

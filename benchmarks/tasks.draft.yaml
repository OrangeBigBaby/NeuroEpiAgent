      White adults in NHANES 2011-2018.
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES has race/ethnicity data (RIDRETH1 - illustrative) and stroke self-report
      (MCQ160F - illustrative). Cross-sectional disparity analysis is feasible with
      survey design adjustments.
    domain_specific_notes: "Race coding and sample size for subgroup analysis needs expert review"
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  - id: disparities_education_outcomes
    domain: disparities

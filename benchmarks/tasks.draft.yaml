# Comprehensive draft benchmark tasks for NeuroSurgEpiAgent evaluation.
# This is a DRAFT task set for pilot testing only. It cannot support scientific claims.
# See GOLD_STANDARD_PROCESS.md for validation requirements.

registry_version: "1"

tasks:

  # --------------------------------------------------------------------------- #
  # STROKE / CEREBROVASCULAR (10 tasks)
  # --------------------------------------------------------------------------- #

  - id: stroke_metabolic_syndrome
    domain: stroke
    question: >
      Is self-reported stroke history associated with metabolic syndrome components
      (elevated triglycerides, low HDL, high blood pressure, elevated fasting glucose,
      increased waist circumference) in US adults, pooling NHANES 2011-2018 data?
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES captures stroke self-report (MCQ160F - illustrative) and metabolic
      syndrome components (BMXBMI for waist, BPXSY1 for BP, LBXGLU for glucose,
      lipid panel) across cycles G-J. Cross-sectional association is feasible with
      appropriate survey design.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  - id: stroke_cognitive_impairment
    domain: stroke
    question: >
      Is stroke history associated with cognitive impairment scores in older adults
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES lacks consistent cross-cycle cognitive assessment batteries comparable
      across years. No validated cognitive scores available.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: stroke_rural_urban_disparities
    domain: stroke
    question: >
      Are there rural-urban disparities in stroke prevalence using NHANES
      geographic indicators, 2011-2018?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES geographic identifiers are restricted-access and not in public data.
      Urban-rural analysis requires special-access data not available in standard release.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: stroke_income_inequality
    domain: stroke
    question: >
      Is household income associated with stroke prevalence after adjusting for
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES has income data (INDFMPIR - illustrative) and stroke self-report
      (MCQ160F - illustrative). Cross-sectional association is feasible.
    domain_specific_notes: "Income variable needs confirmation against codebook"
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  - id: stroke_smoking_cessation
    domain: stroke
    question: >
      Among former smokers, does time since quitting correlate with stroke
      prevalence in NHANES 2011-2018?
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES has smoking history (SMQ020 - illustrative) and stroke self-report.
      Time-since-quit derivation may be available in smoking questionnaire.
    domain_specific_notes: "Smoking cessation variables need codebook confirmation"
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  - id: sleep_apnea_stroke
    domain: stroke
    question: >
      Is self-reported sleep apnea associated with stroke prevalence in NHANES?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      Sleep apnea items vary across NHANES cycles and are not consistently captured.
      No comparable cross-cycle variable exists.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: air_pollution_stroke
    domain: stroke
    question: >
      Is exposure to ambient air pollution associated with stroke incidence
      using NHANES environmental data linkage?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      Environmental linkage data requires special access protocols and is not
      in standard public NHANES files.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: diet_quality_stroke
    domain: stroke
    question: >
      Is Healthy Eating Index score associated with stroke prevalence in
      NHANES 2011-2018 dietary recall data?
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES has dietary data and stroke self-report. HEI scores are derivable
      from dietary recall, but complex derivation requires expert confirmation.
    domain_specific_notes: "Dietary variables and HEI derivation need expert validation"
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  - id: stroke_vaccination_status
    domain: stroke
    question: >
      Is influenza vaccination status associated with stroke prevalence in
      NHANES 2011-2018?
    expected_database: NHANES
    expected_feasible: true
    rationale: >
      NHANES has vaccination items (confirm specific variable in MCQ or immunization
      files). Cross-sectional association with stroke self-report is feasible.
    domain_specific_notes: "Vaccination variable code needs codebook confirmation"
    review_status: needs_expert_review
    requires_nhanes_codebook: true

  # --------------------------------------------------------------------------- #
  # TRAUMATIC BRAIN INJURY (5 tasks)
  # --------------------------------------------------------------------------- #

  - id: tbi_lifetime_prevalence
    domain: tbi
    question: >
      What is the lifetime prevalence of traumatic brain injury in US adults
      using NHANES 2011-2018?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES lacks a dedicated, comparable TBI item across cycles. No validated
      cross-cycle TBI variable exists.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: tbi_concussion_sports
    domain: tbi
    question: >
      Is sports-related concussion associated with long-term cognitive outcomes
      in NHANES participants?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES does not capture concussion history or sports injury data in a
      consistent cross-cycle format.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: tbi_falls_elderly
    domain: tbi
    question: >
      Are fall-related TBIs associated with mortality in elderly NHANES participants?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES has no mortality linkage for falls or TBI-specific outcomes. No TBI
      capture in questionnaire.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  # --------------------------------------------------------------------------- #
  # CNS TUMORS (5 tasks)
  # --------------------------------------------------------------------------- #

  - id: tumor_glioblastoma_survival
    domain: tumor
    question: >
      Glioblastoma survival by extent of resection using US registry data.
    expected_database: SEER
    expected_feasible: false
    rationale: >
      SEER adapter is planned but not active in MVP. Registry access is beyond
      MVP scope. No histology data in NHANES.
    domain_specific_notes: "SEER adapter not implemented; no tumor histology in NHANES"
    review_status: needs_expert_review
    requires_nhanes_codebook: false

  - id: tumor_meningioma_prevalence
    domain: tumor
    question: >
      Is meningioma prevalence captured in NHANES 2011-2018?
    expected_database: NHANES
    expected_feasible: false
    rationale: >
      NHANES has no brain tumor histology capture. No benign or malignant CNS
      tumor prevalence data.
    domain_specific_notes: null
    review_status: needs_expert_review
    requires_nhanes_codebook: false


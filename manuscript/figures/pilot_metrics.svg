<text x="660" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Error Pattern Analysis</text>
<text x="470" y="465" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="start">Arm A Residual Errors (3 tasks):</text>
<text x="470" y="482" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">• 2 fasting weight mismatches</text>
<text x="470" y="497" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">• 1 unresolved variable; 2 registry-code failures</text>
<text x="470" y="512" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">• 1 weight rescaling error</text>
<text x="470" y="535" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="start">Arm B Systematic Errors (all 10 tasks):</text>
<text x="470" y="552" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">• Causal language, unresolved variables, routing failures</text>
<rect x="50" y="560" width="820" height="80" fill="#ffffcc" stroke="#999900" stroke-width="1"/>
<text x="460" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">⚠️ DEVELOPMENT SET WARNING</text>
<text x="70" y="600" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">These results reflect iterative development-set evaluation with n=10 authored tasks. The v0.2 router</text>
<text x="70" y="615" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">rules were refined against these same 10 tasks, creating overfitting risk where 100% routing</text>
<text x="70" y="630" font-family="Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start">accuracy may be optimistic. Not external validation. No statistical inference or p-values reported.</text>
